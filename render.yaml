services:
  - type: web
    name: resto-manager-api
    env: node
    plan: free
    buildCommand: npx nx build api --prod
    startCommand: cd dist/apps/api && node main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: resto-manager-web
    env: node
    plan: free
    buildCommand: npx nx build web --prod
    startCommand: node apps/web/.next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4200
      - key: NEXT_PUBLIC_API_URL
        value: https://resto-maneger.onrender.com/api
